services:
  # Python Backend (Flask + yt-dlp)
  - type: web
    name: video-master-backend
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000

  # React Frontend (Static Site)
  - type: static
    name: webinsight-pro-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
