services:
  # Python Backend (Flask + yt-dlp)
  - type: web
    name: video-master-backend
    env: docker
    plan: free
    region: singapore
    healthCheckPath: /info?url=https://www.youtube.com/watch?v=dQw4w9WgXcQ
    envVars:
      - key: PORT
        value: 5000

  # React Frontend (Static Site)
  - type: static
    name: webinsight-pro-frontend
    env: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routing:
      routes:
        - type: rewrite
          source: /*
          destination: /index.html
